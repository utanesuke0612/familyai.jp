name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-and-unit:
    name: Static analysis + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm lint

      - name: Vitest (unit tests)
        run: pnpm test

  # ──────────────────────────────────────────────────────────
  # Build check — production build must succeed on every PR.
  # Catches dependency/lockfile drift, Next.js config errors,
  # missing modules early. Uses dummy env vars so build passes
  # without secrets (DB / auth runtime check is skipped because
  # `lib/db/index.ts` is lazy-initialized).
  # ──────────────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: static-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Next.js build
        run: pnpm build
        env:
          # Dummy values — lib/db/index.ts is lazy-initialized, so
          # build doesn't actually connect. Real secrets are needed
          # only at runtime (Vercel) and for the smoke job below.
          DATABASE_URL:    'postgres://dummy:dummy@localhost:5432/dummy'
          NEXTAUTH_SECRET: 'dummy-secret-for-build-only-not-used-at-runtime'
          NEXTAUTH_URL:    'http://localhost:3000'

  # ──────────────────────────────────────────────────────────
  # Smoke test (Phase T1) — builds app and runs curl-based smoke
  # Commented out by default because production smoke requires
  # real runtime env vars (DATABASE_URL, NEXTAUTH_SECRET, etc.).
  # Enable by adding encrypted secrets and uncommenting below.
  # ──────────────────────────────────────────────────────────
  # smoke:
  #   name: Smoke test (curl)
  #   runs-on: ubuntu-latest
  #   needs: static-and-unit
